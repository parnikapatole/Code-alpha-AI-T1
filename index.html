<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polyglot Translator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#c8b6a6,#e7d8ca);
      padding:20px;
    }

    .container{
      width:100%;
      max-width:950px;
      text-align:center;
    }

    h1{
      font-size:3rem;
      color:white;
      margin-bottom:25px;
    }

    .translator-box{
      background:rgba(255,255,255,0.18);
      backdrop-filter:blur(12px);
      padding:30px;
      border-radius:25px;
      box-shadow:0 8px 25px rgba(0,0,0,0.15);
    }

    .lang-row{
      display:flex;
      align-items:center;
      gap:15px;
      margin-bottom:25px;
    }

    select{
      flex:1;
      padding:15px;
      border:none;
      border-radius:15px;
      font-size:1rem;
      background:#f7f2ed;
      outline:none;
      color:#5c4033;
    }

    .swap-btn{
      background:#6f4e37;
      color:white;
      border:none;
      width:55px;
      height:55px;
      border-radius:50%;
      cursor:pointer;
      font-size:1.2rem;
    }

    .text-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
      margin-bottom:25px;
    }

    .box{
      background:#f7f2ed;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 3px 8px rgba(0,0,0,0.08);
    }

    textarea{
      width:100%;
      height:220px;
      border:none;
      resize:none;
      padding:20px;
      font-size:1rem;
      background:transparent;
      outline:none;
      color:#333;
    }

    .box-footer{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 18px;
      background:rgba(0,0,0,0.03);
    }

    .right-icons{
      margin-left:auto;
      display:flex;
      gap:15px;
    }

    .icon-btn{
      cursor:pointer;
      color:#6f4e37;
      font-size:1.1rem;
    }

    .translate-btn{
      width:100%;
      padding:18px;
      font-size:1.1rem;
      border:none;
      border-radius:15px;
      background:#6f4e37;
      color:white;
      cursor:pointer;
      font-weight:bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Polyglot Translator</h1>

  <div class="translator-box">

    <div class="lang-row">
      <select id="fromLang">
        <option value="en">English</option>
        <option value="hi">Hindi</option>
        <option value="mr">Marathi</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
        <option value="it">Italian</option>
        <option value="ko">Korean</option>
        <option value="ja">Japanese</option>
      </select>

      <button class="swap-btn" onclick="swapLanguages()">
        <i class="fas fa-exchange-alt"></i>
      </button>

      <select id="toLang">
        <option value="hi">Hindi</option>
        <option value="en">English</option>
        <option value="mr">Marathi</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
        <option value="it">Italian</option>
        <option value="ko">Korean</option>
        <option value="ja">Japanese</option>
      </select>
    </div>

    <div class="text-row">
      <div class="box">
        <textarea id="inputText" maxlength="500" placeholder="Enter text"></textarea>
        <div class="box-footer">
          <i class="fas fa-volume-up icon-btn" onclick="speakInput()"></i>
          <span id="charCount">0 / 500</span>
        </div>
      </div>

      <div class="box">
        <textarea id="outputText" readonly placeholder="Translation"></textarea>
        <div class="box-footer">
          <div class="right-icons">
            <i class="fas fa-volume-up icon-btn" onclick="speakOutput()"></i>
            <i class="fas fa-copy icon-btn" onclick="copyOutput()"></i>
          </div>
        </div>
      </div>
    </div>

    <button class="translate-btn" onclick="translateText()">Translate</button>

  </div>
</div>

<script>
const inputText = document.getElementById("inputText");
const outputText = document.getElementById("outputText");
const charCount = document.getElementById("charCount");

let voices = [];
let maleVoice = null;

function loadVoices() {
  voices = speechSynthesis.getVoices();

  maleVoice =
    voices.find(v =>
      v.name.toLowerCase().includes("male") ||
      v.name.toLowerCase().includes("david") ||
      v.name.toLowerCase().includes("mark")
    ) || voices[0];
}

speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

inputText.addEventListener("input", () => {
  charCount.textContent = `${inputText.value.length} / 500`;
});

function swapLanguages() {
  const from = document.getElementById("fromLang");
  const to = document.getElementById("toLang");
  [from.value, to.value] = [to.value, from.value];
}

async function translateText() {
  let text = inputText.value.trim();
  if (!text) return alert("Please enter text");

  const from = document.getElementById("fromLang").value;
  const to = document.getElementById("toLang").value;

  try {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${from}&tl=${to}&dt=t&q=${encodeURIComponent(text)}`;
    
    const response = await fetch(url);
    const data = await response.json();

    outputText.value = data[0].map(item => item[0]).join("");
  } catch {
    alert("Translation failed");
  }
}

function getVoiceForLanguage(lang){
  return voices.find(v => v.lang.startsWith(lang)) || voices[0];
}

function speakInput() {
  if (!inputText.value.trim()) return;

  speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(inputText.value);
  utterance.voice = maleVoice;
  utterance.rate = 0.9;
  utterance.pitch = 0.8;

  speechSynthesis.speak(utterance);
}

function speakOutput() {
  if (!outputText.value.trim()) return;

  const lang = document.getElementById("toLang").value;

  speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(outputText.value);
  utterance.voice = getVoiceForLanguage(lang);
  utterance.lang = lang;
  utterance.rate = 0.9;
  utterance.pitch = 1;

  speechSynthesis.speak(utterance);
}

function copyOutput() {
  if (!outputText.value) return;

  navigator.clipboard.writeText(outputText.value)
    .then(() => alert("Copied!"))
    .catch(() => alert("Copy failed"));
}
</script>

</body>
</html>
